# Production stack for datateknologer.se
# ---------------------------------------
# The real docker-compose.yml is gitignored and lives only on the
# server; this is the reference template. To use:
#
#   cp docker-compose.example.yml docker-compose.yml
#   cp Caddyfile.example Caddyfile
#   cp backend/config.example.json backend/config.json   # fill it in!
#   docker compose up -d --build
#
# Then `sync.sh` keeps deploying it (git pull → build → up).
#
# Routing: caddy terminates HTTPS for datateknologer.se and forwards
# everything to `web` (the site's nginx), which serves the SPA and
# proxies /api/v1 + /public on to `app` (the backend). If the server
# already has its own reverse proxy handling TLS, delete the caddy
# service and publish web's port 80 wherever that proxy expects it.

services:
  postgres:
    image: postgres:13
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: CHANGE_ME_DB_PASSWORD # must match DATABASE_URL below
      POSTGRES_DB: root
    volumes:
      - postgres:/var/lib/postgresql/data

  app:
    build: ./backend
    restart: unless-stopped
    # config.json holds admin_password + mail credentials — never commit it
    volumes:
      - ./backend/config.json:/app/config.json:ro
      - uploads:/uploads
      - data:/data
    environment:
      DATABASE_URL: postgresql://root:CHANGE_ME_DB_PASSWORD@postgres/dag?connect_timeout=300&pool_timeout=300
    depends_on:
      - postgres

  web:
    build: ./web-next
    restart: unless-stopped
    depends_on:
      - app

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  postgres: {}
  uploads: {}
  data: {}
  caddy_data: {}
  caddy_config: {}

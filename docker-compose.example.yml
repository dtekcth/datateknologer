# Production stack for datateknologer.se
# ---------------------------------------
# The real docker-compose.yml is gitignored and lives only on the
# server; this is the reference template. To use:
#
#   cp docker-compose.example.yml docker-compose.yml
#   cp backend/config.example.json backend/config.json   # fill it in!
#   docker compose up -d --build
#
# Then `sync.sh` keeps deploying it (git pull → build → up).
#
# Routing: `web` runs Caddy and is the whole front door — it terminates
# HTTPS for datateknologer.se (auto Let's Encrypt), serves the SPA, and
# proxies /api/v1 + /public on to `app` (the backend). If the server
# already has its own reverse proxy handling TLS, drop SITE_ADDRESS and
# the 443 mapping and point that proxy at web's port 80.

services:
  postgres:
    image: postgres:13
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: CHANGE_ME_DB_PASSWORD # must match DATABASE_URL below
      POSTGRES_DB: dag # must match the database name in DATABASE_URL below
    volumes:
      - postgres:/var/lib/postgresql/data

  app:
    build: ./backend
    restart: unless-stopped
    # config.json holds admin_password + mail credentials — never commit it
    volumes:
      - ./backend/config.json:/app/config.json:ro
      - uploads:/uploads
      - data:/data
    environment:
      DATABASE_URL: postgresql://root:CHANGE_ME_DB_PASSWORD@postgres/dag?connect_timeout=300&pool_timeout=300
    depends_on:
      - postgres

  web:
    build: ./web-next
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # the domain(s) Caddy serves + gets certificates for; DNS must
      # already point here before the first start
      SITE_ADDRESS: "datateknologer.se, www.datateknologer.se"
    volumes:
      - caddy_data:/data # persists the issued TLS certificates
      - caddy_config:/config
    depends_on:
      - app

volumes:
  postgres: {}
  uploads: {}
  data: {}
  caddy_data: {}
  caddy_config: {}

server {
    listen 80;
    root /usr/share/nginx/html;

    # the dither illustrations are large SVGs that compress ~10:1 —
    # svg MUST be in this list or the student page ships ~4MB of art
    gzip on;
    gzip_types text/plain text/javascript text/css application/json
               image/svg+xml application/javascript;
    gzip_min_length 1024;

    # hashed build assets never change — cache forever
    location /assets/ {
        add_header Cache-Control 'public, max-age=31536000, immutable';
        try_files $uri =404;
    }

    # SPA entry point must always revalidate so deploys take effect
    # immediately; the vue-router (history mode) handles /en, /sv,
    # /en/student … client-side, so every unknown path falls back to it
    location / {
        add_header Last-Modified $date_gmt;
        add_header Cache-Control 'no-store, no-cache';
        if_modified_since off;
        expires off;
        etag off;

        try_files $uri $uri/ /index.html;
    }

    # same-origin API + uploaded images — forwarded to the backend
    # container (compose service name "app", see docker-compose.example.yml
    # at the repo root). the hostname is resolved lazily through docker's
    # DNS (127.0.0.11), so this container still starts when no backend is
    # on the network (e.g. a plain local `docker run`).
    resolver 127.0.0.11 valid=30s ipv6=off;

    location /api/v1 {
        set $backend http://app:10016;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /public {
        set $backend http://app:10016;
        proxy_pass $backend;
        proxy_set_header Host $host;
    }
}
